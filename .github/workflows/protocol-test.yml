name: protocol-test
on: [push, pull_request]
jobs:
  protocol-test:
    # ubuntu-24.04 ships 64tass 1.59 (matches the version 1.97 was built with).
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install 64tass and py65
      run: |
        sudo apt-get update
        sudo apt-get -y install 64tass python3-pip
        pip3 install py65
    - name: Run Vessel user-port protocol tests
      run: python3 test/sidwizard/run_protocol_test.py
